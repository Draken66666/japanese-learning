# Zeabur 部署配置
# 使用方法：在 Zeabur 创建项目，连接 GitHub 仓库，会自动读取此文件
# 文档：https://zeabur.com/docs

services:
  - type: web
    name: japanese-learning
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: PAYMENT_MODE
        value: qrcode
      - key: PAYMENT_AUTO_ACTIVATE
        value: "true"
      - key: WECHAT_PAY_QR_URL
        sync: false
      - key: ALIPAY_QR_URL
        sync: false
